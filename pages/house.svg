  <path d="M250,92 Q244,78 252,68" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M260,92 Q268,75 260,62" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
