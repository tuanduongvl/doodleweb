  <path d="M63,325 L70,318 L77,325" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="100" y1="325" x2="100" y2="375" stroke="black" stroke-width="2.5"/>
  <path d="M93,325 L100,318 L107,325" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="300" y1="325" x2="300" y2="375" stroke="black" stroke-width="2.5"/>
  <path d="M293,325 L300,318 L307,325" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="330" y1="325" x2="330" y2="375" stroke="black" stroke-width="2.5"/>
  <path d="M323,325 L330,318 L337,325" fill="none" stroke="black" stroke-width="2.5"/>
  <line x1="360" y1="325" x2="360" y2="375" stroke="black" stroke-width="2.5"/>
  <path d="M353,325 L360,318 L367,325" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Tree -->
  <rect x="335" y="260" width="12" height="80" fill="white" stroke="black" stroke-width="2.5"/>
  <circle cx="341" cy="235" r="35" fill="white" stroke="black" stroke-width="3"/>
  <circle cx="320" cy="248" r="22" fill="white" stroke="black" stroke-width="2.5"/>
  <circle cx="362" cy="248" r="22" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- Ground -->
  <path d="M0,375 Q200,368 400,375 L400,400 L0,400 Z" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- Flowers in garden -->
  <circle cx="50" cy="340" r="8" fill="white" stroke="black" stroke-width="2"/>
  <line x1="50" y1="348" x2="50" y2="365" stroke="black" stroke-width="2"/>
  <circle cx="75" cy="335" r="6" fill="white" stroke="black" stroke-width="2"/>
  <line x1="75" y1="341" x2="75" y2="360" stroke="black" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="398" text-anchor="middle" font-family="Arial" font-size="16" fill="black">🏡 House</text>
