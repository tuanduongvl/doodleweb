  <rect x="115" y="210" width="55" height="45" rx="5" fill="white" stroke="black" stroke-width="3"/>
  <line x1="142" y1="210" x2="142" y2="255" stroke="black" stroke-width="2"/>
  <line x1="115" y1="232" x2="170" y2="232" stroke="black" stroke-width="2"/>
  <rect x="230" y="210" width="55" height="45" rx="5" fill="white" stroke="black" stroke-width="3"/>
  <line x1="257" y1="210" x2="257" y2="255" stroke="black" stroke-width="2"/>
  <line x1="230" y1="232" x2="285" y2="232" stroke="black" stroke-width="2"/>
  <!-- Fence -->
  <line x1="30" y1="340" x2="370" y2="340" stroke="black" stroke-width="3"/>
  <line x1="30" y1="360" x2="370" y2="360" stroke="black" stroke-width="3"/>
  <line x1="40" y1="325" x2="40" y2="375" stroke="black" stroke-width="2.5"/>
