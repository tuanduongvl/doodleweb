  <rect x="100" y="180" width="200" height="160" fill="white" stroke="black" stroke-width="4" rx="4"/>
  <!-- Roof -->
  <polygon points="80,180 200,80 320,180" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  <!-- Roof tiles (optional lines) -->
  <line x1="130" y1="165" x2="200" y2="105" stroke="black" stroke-width="1.5"/>
  <line x1="160" y1="173" x2="200" y2="133" stroke="black" stroke-width="1.5"/>
