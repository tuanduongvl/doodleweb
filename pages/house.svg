  <path d="M260,45 Q264,33 276,35 Q280,24 293,27 Q305,24 308,35 Q320,33 323,45 Q323,54 315,54 L268,54 Q260,54 260,45 Z" fill="white" stroke="black" stroke-width="2.5"/>
