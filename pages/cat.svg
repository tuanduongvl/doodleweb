<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Body -->
  <ellipse cx="200" cy="270" rx="80" ry="90" fill="white" stroke="black" stroke-width="4"/>
  <!-- Head -->
  <circle cx="200" cy="155" r="65" fill="white" stroke="black" stroke-width="4"/>
  <!-- Left ear -->
  <polygon points="148,100 130,55 175,90" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  <!-- Right ear -->
  <polygon points="252,100 270,55 225,90" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <polygon points="150,95 137,65 170,88" fill="white" stroke="black" stroke-width="2"/>
  <polygon points="250,95 263,65 230,88" fill="white" stroke="black" stroke-width="2"/>
  <!-- Eyes -->
  <ellipse cx="178" cy="145" rx="12" ry="14" fill="white" stroke="black" stroke-width="3"/>
  <ellipse cx="222" cy="145" rx="12" ry="14" fill="white" stroke="black" stroke-width="3"/>
  <circle cx="178" cy="147" r="5" fill="black"/>
  <circle cx="222" cy="147" r="5" fill="black"/>
  <!-- Pupils shine -->
  <circle cx="181" cy="144" r="2" fill="white"/>
  <circle cx="225" cy="144" r="2" fill="white"/>
  <!-- Nose -->
  <polygon points="200,163 194,172 206,172" fill="black"/>
  <!-- Mouth -->
  <path d="M194,172 Q200,180 206,172" fill="none" stroke="black" stroke-width="3"/>
  <!-- Whiskers left -->
  <line x1="135" y1="165" x2="190" y2="168" stroke="black" stroke-width="2"/>
  <line x1="135" y1="173" x2="190" y2="172" stroke="black" stroke-width="2"/>
  <line x1="140" y1="181" x2="190" y2="176" stroke="black" stroke-width="2"/>
  <!-- Whiskers right -->
  <line x1="265" y1="165" x2="210" y2="168" stroke="black" stroke-width="2"/>
  <line x1="265" y1="173" x2="210" y2="172" stroke="black" stroke-width="2"/>
  <line x1="260" y1="181" x2="210" y2="176" stroke="black" stroke-width="2"/>
  <!-- Front paws -->
  <ellipse cx="158" cy="345" rx="25" ry="15" fill="white" stroke="black" stroke-width="3"/>
  <ellipse cx="242" cy="345" rx="25" ry="15" fill="white" stroke="black" stroke-width="3"/>
  <!-- Paw toes -->
  <line x1="148" y1="345" x2="145" y2="355" stroke="black" stroke-width="2"/>
  <line x1="158" y1="348" x2="158" y2="358" stroke="black" stroke-width="2"/>
  <line x1="168" y1="345" x2="171" y2="355" stroke="black" stroke-width="2"/>
  <line x1="232" y1="345" x2="229" y2="355" stroke="black" stroke-width="2"/>
  <line x1="242" y1="348" x2="242" y2="358" stroke="black" stroke-width="2"/>
  <line x1="252" y1="345" x2="255" y2="355" stroke="black" stroke-width="2"/>
  <!-- Tail -->
  <path d="M280,290 Q340,260 330,200 Q320,160 290,170" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Belly stripe -->
  <ellipse cx="200" cy="280" rx="40" ry="55" fill="white" stroke="black" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial" font-size="18" fill="black">🐱 Cat</text>
</svg>
