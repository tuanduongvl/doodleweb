<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Doodle" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Doodle &amp; Color</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Toolbar -->
  <div id="toolbar" role="toolbar" aria-label="Drawing tools">

    <!-- Row 1: Color Palette -->
    <div class="toolbar-row toolbar-row--palette">
      <div class="tool-group" id="palette">
        <!-- Rainbow special swatch -->
        <button class="swatch swatch-rainbow" id="swatchRainbow" title="Rainbow" aria-label="Rainbow"></button>
  <!-- 15 core hues -->
  <button class="swatch active" data-color="#ff4d6d" style="background:#ff4d6d" title="Cherry"></button>
  <button class="swatch" data-color="#ff7a00" style="background:#ff7a00" title="Orange"></button>
  <button class="swatch" data-color="#ffc300" style="background:#ffc300" title="Sunflower"></button>
  <button class="swatch" data-color="#f6f930" style="background:#f6f930" title="Lemon"></button>
  <button class="swatch" data-color="#4cd964" style="background:#4cd964" title="Green"></button>
  <button class="swatch" data-color="#00c2a8" style="background:#00c2a8" title="Teal"></button>
  <button class="swatch" data-color="#00b4ff" style="background:#00b4ff" title="Cyan"></button>
  <button class="swatch" data-color="#3b82f6" style="background:#3b82f6" title="Blue"></button>
  <button class="swatch" data-color="#4f46e5" style="background:#4f46e5" title="Indigo"></button>
  <button class="swatch" data-color="#7c3aed" style="background:#7c3aed" title="Violet"></button>
  <button class="swatch" data-color="#c026d3" style="background:#c026d3" title="Magenta"></button>
  <button class="swatch" data-color="#ff4fd8" style="background:#ff4fd8" title="Fuchsia"></button>
  <button class="swatch" data-color="#ff8fab" style="background:#ff8fab" title="Rose"></button>
  <button class="swatch" data-color="#ffad5a" style="background:#ffad5a" title="Peach"></button>
  <button class="swatch" data-color="#8d6e63" style="background:#8d6e63" title="Cocoa"></button>
  <!-- 10 glitter swatches -->
  <button class="swatch swatch-glitter" data-color="#ff9ff3" style="background:#ff9ff3" title="Glitter Pink"></button>
  <button class="swatch swatch-glitter" data-color="#feca57" style="background:#feca57" title="Glitter Gold"></button>
  <button class="swatch swatch-glitter" data-color="#ff6b6b" style="background:#ff6b6b" title="Glitter Coral"></button>
  <button class="swatch swatch-glitter" data-color="#1dd1a1" style="background:#1dd1a1" title="Glitter Mint"></button>
  <button class="swatch swatch-glitter" data-color="#48dbfb" style="background:#48dbfb" title="Glitter Sky"></button>
  <button class="swatch swatch-glitter" data-color="#54a0ff" style="background:#54a0ff" title="Glitter Blue"></button>
  <button class="swatch swatch-glitter" data-color="#5f27cd" style="background:#5f27cd" title="Glitter Purple"></button>
  <button class="swatch swatch-glitter" data-color="#c8d6e5" style="background:#c8d6e5" title="Glitter Silver"></button>
  <button class="swatch swatch-glitter" data-color="#ff9f43" style="background:#ff9f43" title="Glitter Amber"></button>
  <button class="swatch swatch-glitter" data-color="#00d2d3" style="background:#00d2d3" title="Glitter Aqua"></button>
        <!-- Custom color picker -->
        <label class="swatch swatch-picker" title="Custom color" aria-label="Custom color">
          🎨
          <input type="color" id="colorPicker" value="#ff4d6d" />
        </label>
      </div>
    </div>

    <!-- Row 2: Size + Tools -->
    <div class="toolbar-row toolbar-row--tools">
      <div class="tool-group" id="size-group">
        <span class="tool-label">Size</span>
        <input type="range" id="brushSize" min="1" max="60" value="6" aria-label="Brush size" />
        <span id="sizeDisplay" class="size-display">6</span>
      </div>

      <div class="divider"></div>

      <div class="tool-group" id="tools">
        <button class="tool-btn active" id="btnPen" title="Pen (P)" aria-label="Pen">✏️</button>
        <button class="tool-btn" id="btnBucket" title="Fill (F)" aria-label="Paint Bucket">🪣</button>
        <button class="tool-btn" id="btnEraser" title="Eraser (E)" aria-label="Eraser">🧹</button>
        <button class="tool-btn" id="btnUndo" title="Undo (Ctrl+Z)" aria-label="Undo">↩️</button>
        <button class="tool-btn" id="btnClear" title="Clear" aria-label="Clear canvas">🗑️</button>
        <button class="tool-btn" id="btnSave" title="Save PNG" aria-label="Save as PNG">💾</button>
        <button class="tool-btn" id="btnPages" title="Coloring Pages" aria-label="Coloring Pages">📖</button>
      </div>
    </div>
  </div>

  <!-- Coloring Pages Side Panel -->
  <div id="pagesPanel" aria-label="Coloring Pages" role="dialog">
    <div id="pagesPanelHeader">
      <span id="pagesPanelTitle">🎨 Coloring Pages</span>
      <button id="btnClosePanel" aria-label="Close panel">×</button>
    </div>
    <p id="pagesPanelHint">Tap a page to start coloring!</p>
    <div id="pagesGrid">
    </div>
  </div>

  <!-- Confirm modal -->
  <div id="confirmModal" role="dialog" aria-modal="true" aria-label="Confirm">
    <div id="confirmBox">
      <p id="confirmMsg">Load this coloring page? Your current drawing will be cleared.</p>
      <div id="confirmBtns">
        <button id="confirmOk" class="confirm-btn confirm-ok">Yes, load it!</button>
        <button id="confirmCancel" class="confirm-btn confirm-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
